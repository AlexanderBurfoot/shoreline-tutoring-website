              - img [ref=e593]
          - region "How often should my child have tutoring?":
            - paragraph [ref=e595]: We recommend at least once a week to build consistent momentum and keep concepts fresh between school lessons. That said, frequency is flexible, some students prefer with a single session per week, while others thrive from more regular tutoring. We'll work with you to find a rhythm that suits your child's schedule and goals, and be flexible especially around exam periods.
        - generic [ref=e597]:
          - heading "Do you provide homework and notes after each session?" [level=3] [ref=e598]:
            - button "Do you provide homework and notes after each session?" [ref=e599] [cursor=pointer]:
              - generic [ref=e600]: Do you provide homework and notes after each session?
              - img [ref=e602]
          - region "Do you provide homework and notes after each session?":
            - paragraph [ref=e604]: Yes! After every session, your child receives notes summarising what was covered, along with targeted homework and practice questions. This ensures nothing is forgotten and gives students structured material to revise between sessions.
        - generic [ref=e606]:
          - heading "How do I track my child's progress?" [level=3] [ref=e607]:
            - button "How do I track my child's progress?" [ref=e608] [cursor=pointer]:
              - generic [ref=e609]: How do I track my child's progress?
              - img [ref=e611]
          - region "How do I track my child's progress?":
            - paragraph [ref=e613]: We keep parents informed every step of the way through a dedicated WhatsApp group that includes the student, parents, tutor, and tutor's assistant. You'll receive regular updates covering topics completed, areas of improvement, and upcoming focus areas, and we always welcome questions between sessions!
        - generic [ref=e615]:
          - heading "What is the difference between per-hour and bundle pricing?" [level=3] [ref=e616]:
            - button "What is the difference between per-hour and bundle pricing?" [ref=e617] [cursor=pointer]:
              - generic [ref=e618]: What is the difference between per-hour and bundle pricing?
              - img [ref=e620]
          - region "What is the difference between per-hour and bundle pricing?":
            - paragraph [ref=e622]: Our 20 Lesson Bundle offers a 10% discounted rate compared to per-hour pricing, it is ideal for students committed to consistent improvement over a term. Per-hour pricing gives you flexibility if you prefer to book on a session-by-session basis. Visit our Pricing page for full details.
