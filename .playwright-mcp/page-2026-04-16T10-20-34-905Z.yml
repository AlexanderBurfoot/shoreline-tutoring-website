          - img [ref=e231]
          - paragraph [ref=e233]: I have really enjoyed my Year 12 IB Chemistry tutoring at Shoreline Tutoring, and my tutor has made a huge difference to both my confidence and my results. Before I started, I found the calculation side of Chemistry difficult, especially moles, stoichiometry, and longer multi-step questions. What helped me most was the way my tutor explained things, he broke difficult ideas down clearly and always linked the maths-based problems to the chemistry behind them, which made topics that had previously felt overwhelming much easier to understand. What I appreciated most was that he never just taught me to memorise a method. He made sure I understood why each step worked and how to apply the same thinking across different types of questions. After each session, he set targeted homework and practice exam questions for each Chemistry subtopic and sub-subtopic we covered, which helped me consolidate what I had learned and build real confidence with the kinds of questions that come up in exams. That structured approach made a big difference to my problem-solving skills, and topics I once found daunting started to feel manageable. Over time, I became more accurate, faster, and far less stressed in quantitative Chemistry. I have improved enormously through his tutoring and would wholeheartedly recommend him to any student looking to build genuine confidence and a much stronger understanding of IB courses.
